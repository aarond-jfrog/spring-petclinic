name: Build, Test, and Publish Petclinic

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JF_URL: ${{ vars.JF_URL }}
  JF_MAVEN_VIRTUAL: ${{ vars.JF_MAVEN_VIRTUAL }}
  JF_DOCKER_REPO: ${{ vars.JF_DOCKER_REPO }}
  JF_USER: ${{ secrets.JF_USER }}
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

jobs:
  build-test-package-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_URL }}
          JF_ACCESS_TOKEN: ${{ env.JF_ACCESS_TOKEN }}

      - name: Create Maven settings.xml forcing all resolution through Artifactory
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>artifactory</id>
                <username>${JF_USER}</username>
                <password>${JF_ACCESS_TOKEN}</password>
              </server>
            </servers>

            <mirrors>
              <mirror>
                <id>artifactory</id>
                <name>Artifactory Maven Virtual</name>
                <url>${JF_URL}/artifactory/${JF_MAVEN_VIRTUAL}</url>
                <mirrorOf>*</mirrorOf>
              </mirror>
            </mirrors>

            <profiles>
              <profile>
                <id>use-artifactory</id>
                <repositories>
                  <repository>
                    <id>central-through-artifactory</id>
                    <url>${JF_URL}/artifactory/${JF_MAVEN_VIRTUAL}</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>plugins-through-artifactory</id>
                    <url>${JF_URL}/artifactory/${JF_MAVEN_VIRTUAL}</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>

            <activeProfiles>
              <activeProfile>use-artifactory</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Compile
        run: ./mvnw -B -s ~/.m2/settings.xml clean compile

      - name: Test
        run: ./mvnw -B -s ~/.m2/settings.xml test

      - name: Package JAR
        run: ./mvnw -B -s ~/.m2/settings.xml package -DskipTests

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${JF_URL#https://}/artifactory/${JF_DOCKER_REPO}/spring-petclinic:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build OCI image with Spring Boot
        run: |
          ./mvnw -B -s ~/.m2/settings.xml \
            spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=${IMAGE_NAME}

      - name: Docker login to Artifactory
        run: |
          echo "${JF_ACCESS_TOKEN}" | docker login "${JF_URL#https://}" -u "${JF_USER}" --password-stdin

      - name: Push image to Artifactory
        run: docker push "${IMAGE_NAME}"
